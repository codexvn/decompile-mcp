services:
  decompile-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: decompile-mcp:latest
    container_name: decompile-mcp
    ports:
      # Streamable HTTP 端口
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # 挂载缓存目录，持久化已下载的包（Maven/npm/PyPI + 反编译缓存）
      - ${HOME}/.decompile-mcp:/maven-repo
    environment:
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      # 可选：配置 Maven 镜像仓库列表
      - M2_REPOSITORIES=${M2_REPOSITORIES:-}
    restart: "no"
